# T7 对齐对比契约（Flask + SQLite + Web）
layout: flask-monolith

requiredFiles:
  - app.py
  - models.py
  - static/js/app.js
  - templates/index.html
  - config.yaml
  - requirements.txt
  - DELIVERY.md

outputs:
  - output/smoke_report.json

smoke:
  command: python app.py --smoke
  output: output/smoke_report.json

forbidden:
  - openctp
  - np.random
