[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "stagent-codeact-runner"
version = "0.1.0"
description = "Stagent CodeAct runner — wraps vendored openhands-sdk for hybrid delivery"
readme = "README.md"
requires-python = ">=3.12,<3.14"
license = { text = "Proprietary — see repository root LICENSE" }
# Runtime deps: vendored openhands-sdk + openhands-tools (Scheme A).
# Installed via requirements-vendored.txt — NOT PyPI. See npm run codeact:install.
dependencies = []

[project.scripts]
stagent-codeact = "stagent_codeact.__main__:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["stagent_codeact*"]

# Machine-readable vendored paths (for docs/tooling; install uses requirements-vendored.txt).
[tool.stagent-codeact-runner]
vendored-openhands-sdk = "../../vendors/software-agent-sdk/openhands-sdk"
vendored-openhands-tools = "../../vendors/software-agent-sdk/openhands-tools"
vendored-version = "1.28.0"
